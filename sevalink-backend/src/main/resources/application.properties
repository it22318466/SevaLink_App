spring.application.name=sevalink-backend
server.port=8080
spring.datasource.url=${SPRING_DATASOURCE_URL}
# PostgreSQL username (default is postgres)
spring.datasource.username=${SPRING_DATASOURCE_USERNAME}
# Your PostgreSQL password
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD}
# PostgreSQL driver class name
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA/HIBERNATE CONFIGURATION

# ddl-auto options:
# - none: Don't change database structure
# - validate: Check if tables match entities
# - update: Create/update tables based on entities (use for development)
# - create: Drop and recreate tables (loses all data!)
spring.jpa.hibernate.ddl-auto=update

# Show SQL queries in console (helps debugging)
spring.jpa.show-sql=true

# Format SQL to be readable
spring.jpa.properties.hibernate.format_sql=true

# Tell Hibernate to use PostgreSQL dialect
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect



# JWT (JSON WEB TOKEN) CONFIGURATION

# Secret key for signing JWTs (MUST be at least 64 characters for HS512)
# Generate using: https://www.allkeysgenerator.com/
jwt.secret=${JWT_SECRET}

# How long access token lasts (24 hours in milliseconds)
# 24 * 60 * 60 * 1000 = 86,400,000
jwt.access-token-expiry=86400000

# How long refresh token lasts (7 days)
# 7 * 24 * 60 * 60 * 1000 = 604,800,000
jwt.refresh-token-expiry=604800000


# EMAIL CONFIGURATION (For Password Reset)

spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${SPRING_MAIL_USERNAME}
spring.mail.password=${SPRING_MAIL_PASSWORD}
spring.mail.protocol=smtp
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true
spring.mail.properties.mail.smtp.ssl.trust=smtp.gmail.com
spring.mail.properties.mail.debug=true

# Enable email for your app
app.email.enabled=true

# LOGGING CONFIGURATION

# Show debug logs for authentication
logging.level.com.sevalink=DEBUG
logging.level.org.springframework.security=DEBUG

# Development
app.cors.allowed-origins=http://localhost:3000,http://localhost:50849

# Production (when deployed)
# app.cors.allowed-origins=https://yourdomain.com,https://app.yourdomain.com

# ============================================
# GOOGLE MAPS CONFIGURATION
# ============================================
google.maps.api-key=${GOOGLE_MAPS_API_KEY}

# ============================================
# FIREBASE PUSH NOTIFICATION CONFIGURATION
# ============================================
# Path to the Firebase service account JSON file (relative or absolute)
firebase.config.path=${FIREBASE_CONFIG_PATH}